// ══ NOTIFICATIONS ══════════════════════════════════════════════════════════
function getUpcoming(days=7){
  const today=new Date();today.setHours(0,0,0,0);
  const limit=new Date(today);limit.setDate(limit.getDate()+days);
  // Include both event dates AND delivery deadlines
  const results=[];
  zlecenia.forEach(z=>{
    if(z.date){const d=new Date(z.date);if(d>=today&&d<=limit)results.push({...z,_alertDate:z.date,_alertType:'sesja'});}
    if(z.deliveryDeadline&&z.deliveryDeadline!==z.date){const d=new Date(z.deliveryDeadline);if(d>=today&&d<=limit)results.push({...z,_alertDate:z.deliveryDeadline,_alertType:'dostawa'});}
  });
  return results.sort((a,b)=>a._alertDate.localeCompare(b._alertDate));
}
function updateNotifBadge(){const u=getUpcoming(7);const b=document.getElementById('notif-badge');if(u.length){b.textContent=u.length;b.style.display='';}else b.style.display='none';}
function toggleNotifDropdown(){const dd=document.getElementById('notif-dropdown');const open=dd.style.display!=='none';if(open){dd.style.display='none';return;}renderNotifList();dd.style.display='';}
function renderNotifList(){
  const upcoming=getUpcoming(14);
  const list=document.getElementById('notif-list');
  if(!upcoming.length){list.innerHTML='<div class="notif-empty">Brak terminów w ciągu 14 dni</div>';return;}
  const today=new Date();today.setHours(0,0,0,0);
  list.innerHTML=upcoming.map(z=>{
    const diff=Math.floor((new Date(z._alertDate)-today)/(1000*60*60*24));
    const when=diff===0?'Dziś! 🔴':diff===1?'Jutro 🟠':`Za ${diff} dni`;
    const urgColor=diff===0?'#ff4444':diff<=2?'#ff7a2f':'#4ade80';
    const typeLabel=z._alertType==='dostawa'?'📦 Termin oddania':'📅 Sesja/ślub';
    return `<div class="notif-item" onclick="openDetail('${z.id}');toggleNotifDropdown()">
      <div class="notif-dot" style="background:${CATS[z.cat]?.color||'#888'}"></div>
      <div class="notif-info"><div class="notif-name">${esc(z.name)}</div><div class="notif-when">${typeLabel}</div></div>
      <div class="notif-urgency" style="background:${urgColor}20;color:${urgColor}">${when}</div>
    </div>`;
  }).join('');
}
async function requestNotifPermission(){
  if(!('Notification'in window)){alert('Przeglądarka nie obsługuje powiadomień.');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){fireNotifications();alert('Powiadomienia włączone!');}
  else alert('Powiadomienia zablokowane w przeglądarce.');
}
function fireNotifications(){
  if(Notification.permission!=='granted')return;
  const today=new Date().toISOString().slice(0,10);
  const shown=JSON.parse(localStorage.getItem('foto_notif_shown')||'{}');
  getUpcoming(3).forEach(z=>{
    const key=`${z.id}_${z._alertType}_${today}`;
    if(shown[key])return;
    const diff=Math.floor((new Date(z._alertDate)-new Date().setHours(0,0,0,0))/(1000*60*60*24));
    const when=diff===0?'Dziś!':diff===1?'Jutro':`Za ${diff} dni`;
    const type=z._alertType==='dostawa'?'📦 Termin oddania':'📅 Sesja';
    new Notification(`📷 ${z.name}`,{body:`${type} — ${when}`,tag:z.id+z._alertType});
    shown[key]=true;
  });
  localStorage.setItem('foto_notif_shown',JSON.stringify(shown));
}

    const reader=new FileReader();

        const data=JSON.parse(ev.target.result);
        if(!confirm(`Importować ${data.zlecenia?.length||0} zleceń? Obecne dane zostaną zastąpione.`))return;

async function gdriveConnect(){

async function driveRequest(url,opts={}){
  opts.headers={...opts.headers,Authorization:'Bearer '+gdriveToken};
  const r=await fetch(url,opts);
  if(r.status===401){gdriveToken=null;updateDriveBtn();throw new Error('Token wygasł — zaloguj się ponownie');}

}

async function findDriveFile(){
  if(gdriveFileId)return gdriveFileId;
  const r=await driveRequest(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%22${GDRIVE_FNAME}%22&fields=files(id,name)`);
  const d=await r.json();
  gdriveFileId=d.files?.[0]?.id||null;
  return gdriveFileId;
}

async function gdriveSave(){
  if(!gdriveToken){const ok=await gdriveConnect();if(!ok||!gdriveToken)return;setTimeout(()=>showDriveToast('Zaloguj się, potem kliknij Zapisz ponownie'),500);return;}
  showDriveToast('☁ Zapisuję na Drive...');
  try{
    await findDriveFile();
    const content=JSON.stringify({zlecenia,cols,exported:new Date().toISOString(),version:4},null,2);
    const bnd='---fotoplaner---boundary---';
    const method=gdriveFileId?'PATCH':'POST';
    const metaObj=gdriveFileId?{name:GDRIVE_FNAME}:{name:GDRIVE_FNAME,parents:['appDataFolder']};
    const meta=JSON.stringify(metaObj);
    const body=`--${bnd}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${bnd}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${bnd}--`;
    const url=gdriveFileId
      ?`https://www.googleapis.com/upload/drive/v3/files/${gdriveFileId}?uploadType=multipart`
      :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const r=await driveRequest(url,{method,headers:{'Content-Type':'multipart/related; boundary='+bnd},body});
    const json=await r.json();
    if(json.id){gdriveFileId=json.id;showDriveToast('☁ Zapisano na Drive! ('+new Date().toLocaleTimeString('pl')+')');}
    else throw new Error(json.error?.message||JSON.stringify(json));
  }catch(e){showDriveToast('Błąd zapisu: '+e.message,true);}
}

// ══ GOOGLE CALENDAR SYNC ════════════════════════════════════════════════════
const GCAL_API='https://www.googleapis.com/calendar/v3/calendars/primary/events';

function gcalEventBody(z){
  const cat=CATS[z.cat]||{};
  const label=getCatLabel(z);
  const desc=[
    z.secondShooter?`2. fotograf: ${z.secondShooter}`:'',
    z.location?`Lokalizacja: ${z.location}`:'',
    z.price?`Wynagrodzenie: ${Number(z.price).toLocaleString('pl')} zł`:'',
    z.deposit?`Zaliczka: ${Number(z.deposit).toLocaleString('pl')} zł`:'',
    z.notes?`Notatki: ${z.notes}`:'',
    z.deliveryDeadline?`Termin oddania: ${z.deliveryDeadline}${z.deliveryTime?' o '+z.deliveryTime:''}`:'',
  ].filter(Boolean).join('\n');
  const body={
    summary:`${cat.icon||''} ${z.name} [${label}]`,
    description:desc||undefined,
  };
  // session date
  if(z.date){
    body.start={date:z.date};
    body.end={date:z.date};
  }
  return body;
}

async function gcalRequest(url,method='GET',body=null){
  const opts={method,headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(r.status===401){gdriveToken=null;updateDriveBtn();throw new Error('Token wygasł');}
  return r;
}

async function gcalSyncZlecenie(z){
  if(!gdriveToken||!z.date)return;
  try{
    const body=gcalEventBody(z);
    if(z.gcalEventId){
      // update existing
      const r=await gcalRequest(`${GCAL_API}/${z.gcalEventId}`,'PUT',body);
      if(r.status===404){
        // event was deleted in Calendar — recreate
        delete z.gcalEventId;
        await gcalSyncZlecenie(z);
      }
    } else {
      // create new
      const r=await gcalRequest(GCAL_API,'POST',body);
      const json=await r.json();
      if(json.id){z.gcalEventId=json.id;localStorage.setItem('foto_v4',JSON.stringify(zlecenia));}
    }
  }catch(e){console.warn('gcalSync error:',e.message);}
}

async function gcalDeleteZlecenie(z){
  if(!gdriveToken||!z.gcalEventId)return;
  try{await gcalRequest(`${GCAL_API}/${z.gcalEventId}`,'DELETE');}catch(e){}
}

async function gcalSyncAll(){
  if(!gdriveToken)return;
  showDriveToast('📅 Synchronizuję z Google Calendar...');
  const withDates=zlecenia.filter(z=>z.date);
  let newIds=false;
  for(const z of withDates){
    const hadId=!!z.gcalEventId;
    await gcalSyncZlecenie(z);
    if(!hadId&&z.gcalEventId)newIds=true;
  }
  // Jeśli pojawiły się nowe ID eventów — zapisz na Drive żeby inne urządzenia nie tworzyły duplikatów
  if(newIds) await gdriveSave();
  showDriveToast(`📅 Zsynchronizowano ${withDates.length} zdarzeń z Google Calendar`);
}

// ══ PWA — MANIFEST + INSTALL PROMPT (#19) ══════════════════════════════════
let deferredInstallPrompt=null;

function initPWA(){
  // Inline manifest via Blob URL (works on HTTPS / localhost)
  const manifest={
    name:'FotoPlaner',short_name:'FotoPlaner',
    description:'Planer dla fotografa — kalendarz, kanban, finanse',
    start_url:location.pathname||'./','display':'standalone',
    background_color:'#0d0d0d',theme_color:'#e84393',
    icons:[{
      src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23e84393"/><text y=".9em" font-size="75" text-anchor="middle" x="50">📷</text></svg>',
      sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'
    }]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);

  // Catch install prompt
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredInstallPrompt=e;
    const btn=document.getElementById('install-btn');if(btn)btn.style.display='';
  });
  window.addEventListener('appinstalled',()=>{
    deferredInstallPrompt=null;
    const btn=document.getElementById('install-btn');if(btn)btn.style.display='none';
    showDriveToast('✅ Aplikacja zainstalowana!');
  });

  // Service Worker (works on HTTPS/localhost, not file://)
  if('serviceWorker' in navigator && location.protocol!=='file:'){
    const sw=`const C='fp-v1';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(C).then(c=>c.add(new Request(self.location.origin+self.location.pathname.replace('sw.js','')||'/')))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(e.request.url.startsWith(self.location.origin)){
      const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));
    }return res;
  }))
));`;
    const swBlob=new Blob([sw],{type:'text/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    // Note: Blob-URL SW scope is limited — for full offline support host on HTTPS
    navigator.serviceWorker.register(swUrl,{scope:'./'}).catch(()=>{});
  }
}

async function installPWA(){
  if(!deferredInstallPrompt){
    if(location.protocol==='file:')
      alert('📱 Instalacja jako PWA\n\nWymaga HTTPS. Wgraj plik na GitHub Pages:\n1. github.com → nowe repozytorium\n2. Wgraj fotograf-planer.html\n3. Settings → Pages → Deploy from branch\n4. Otwórz stronę w Chrome/Edge → Zainstaluj');
    else
      showDriveToast('Przeglądarka nie pokazała przycisku instalacji — spróbuj w Chrome/Edge');
    return;
  }
  const r=await deferredInstallPrompt.prompt();
  if(r.outcome==='accepted')deferredInstallPrompt=null;
}

// ══ LOCK SCREEN ═══════════════════════════════════════════════════════════
(function initLock(){
  const LS_AUTH = 'foto_auth';
  const HASH    = '1nxkmfc'; // hash of correct password

  function hashPwd(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return (h>>>0).toString(36);}

  if(localStorage.getItem(LS_AUTH)==='1'){
    document.getElementById('lock-screen').classList.add('hidden');
    return;
  }

  document.getElementById('lock-title').textContent='Odblokuj aplikację';
  document.getElementById('lock-sub').textContent='Wpisz hasło aby otworzyć FotoPlaner.\nNa tym urządzeniu nie będziesz pytany ponownie.';
  setTimeout(()=>document.getElementById('lock-pwd').focus(),100);

  window.lockSubmit = function(){
    const el  = document.getElementById('lock-pwd');
    const err = document.getElementById('lock-err');
    const val = el.value;
    if(!val){err.textContent='Wpisz hasło';el.focus();return;}
    if(hashPwd(val)===HASH){
      localStorage.setItem(LS_AUTH,'1');
      document.getElementById('lock-screen').classList.add('hidden');
    } else {
      err.textContent='Nieprawidłowe hasło';el.value='';el.focus();
    }
  };
})();

// ══ INIT ═══════════════════════════════════════════════════════════════════
loadData();
initCal();
initPWA();
if(Notification.permission==='granted')fireNotifications();
// Auto-reconnect Drive silently (no popup) if user already authorized before
if(GDRIVE_CLIENT_ID){
  loadGIS().then(()=>{
    initGIS();
    if(tokenClient)tokenClient.requestAccessToken({prompt:''});
  }).catch(()=>{});
}
